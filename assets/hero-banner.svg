<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a12"/>
      <stop offset="100%" stop-color="#0d1320"/>
    </linearGradient>

    <linearGradient id="titleGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="0" spreadMethod="repeat">
      <stop offset="0%" stop-color="#00F5D4"/>
      <stop offset="33%" stop-color="#9B5DE5"/>
      <stop offset="66%" stop-color="#F15BB5"/>
      <stop offset="100%" stop-color="#00F5D4"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="1200 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#00F5D4"/>
      <stop offset="100%" stop-color="#00F5D4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="vign" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#101a2e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#070a12" stop-opacity="0.9"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="bigBlur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#16213a" stroke-width="1"/>
    </pattern>

    <marker id="arrowGlow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <circle cx="4" cy="4" r="2.4" fill="#00F5D4"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="320" fill="url(#vign)"/>

  <!-- ambient drifting connection lines -->
  <g stroke="#1fb8a6" stroke-width="1" opacity="0.35">
    <path d="M60,60 L230,110" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M1140,55 L970,105" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.1s" repeatCount="indefinite"/>
    </path>
    <path d="M70,260 L240,225" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M1130,270 L965,230" stroke-dasharray="4 6">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.9s" repeatCount="indefinite"/>
    </path>
    <path d="M150,150 L320,170" stroke-dasharray="3 5">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.3s" repeatCount="indefinite"/>
    </path>
    <path d="M1050,150 L880,170" stroke-dasharray="3 5">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- pulsing neural nodes -->
  <g>
    <circle cx="60" cy="60" r="4" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="110" r="3" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="55" r="4" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="970" cy="105" r="3" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="260" r="3.5" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="225" r="3" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="270" r="4" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" begin="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="965" cy="230" r="3" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="170" r="3" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="170" r="3" fill="url(#nodeGlow)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.0s" begin="0.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- floating particles drifting upward -->
  <g fill="#00F5D4">
    <circle r="2" opacity="0.8">
      <animateMotion path="M150,300 C 140,220 170,140 130,40" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" opacity="0.7" fill="#9B5DE5">
      <animateMotion path="M1080,310 C 1100,230 1060,150 1100,50" dur="7s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.2" opacity="0.6" fill="#F15BB5">
      <animateMotion path="M620,300 C 600,220 650,140 610,30" dur="8s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="8s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.8" opacity="0.7">
      <animateMotion path="M380,310 C 360,230 400,150 370,40" dur="6.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="6.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.6" opacity="0.7" fill="#9B5DE5">
      <animateMotion path="M860,305 C 880,225 840,145 870,35" dur="7.5s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="7.5s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- badge pill -->
  <g>
    <rect x="500" y="18" width="200" height="28" rx="14" fill="#0d1726" stroke="#2dd4bf" stroke-width="1.2">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <text x="600" y="37" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="13" letter-spacing="2" fill="#5eead4">ELEVATE 2026 ENTRY</text>
  </g>

  <!-- glow duplicate of title (blurred) -->
  <text x="600" y="172" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-weight="900" font-size="92" fill="#2dd4bf" filter="url(#bigBlur)" opacity="0.55">ContextTab</text>

  <!-- crisp title -->
  <text x="600" y="172" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-weight="900" font-size="92" fill="url(#titleGrad)">ContextTab</text>

  <!-- subtitle with typewriter reveal -->
  <g>
    <clipPath id="revealClip">
      <rect x="0" y="195" width="0" height="50">
        <animate attributeName="width" values="0;640;640;0" keyTimes="0;0.45;0.9;1" dur="7s" repeatCount="indefinite"/>
        <animate attributeName="x" values="280;280;280;280" dur="7s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <text x="600" y="228" text-anchor="middle" font-family="Consolas, 'JetBrains Mono', monospace" font-size="26" fill="#cdd6e4" letter-spacing="1" clip-path="url(#revealClip)">Your Browser's Second Brain 🧠</text>
  </g>

  <!-- blinking cursor -->
  <rect x="918" y="206" width="3" height="26" fill="#5eead4">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.9s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom scanning beam -->
  <rect y="312" width="1200" height="3" fill="url(#titleGrad)" opacity="0.8"/>
</svg>
